apiVersion: 1

# Dashboards use datasource type "prometheus" (default). UID kept for explicit imports.
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: gap_prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    uid: gap_loki
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
