# Copy to docker-compose.dev.yml (gitignored) for local development:
#   cp docker-compose.dev.example.yml docker-compose.dev.yml
#
# Dev compose publishes ports and uses prometheus.dev.yml (host.docker.internal targets).

services:
  prometheus:
    image: prom/prometheus:v2.53.2
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    networks:
      - gaptel_monitoring
      - postgres_net
    depends_on:
      - alertmanager
      - blackbox-exporter
      - node-exporter

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - gaptel_monitoring

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    command:
      - "--config.file=/config/blackbox.yml"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./blackbox.yml:/config/blackbox.yml:ro
    networks:
      - gaptel_monitoring
      - postgres_net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - gaptel_monitoring

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - gaptel_monitoring
    depends_on:
      - prometheus

volumes:
  grafana_data:

networks:
  gaptel_monitoring:
    name: gaptel_monitoring
    driver: bridge
  postgres_net:
    external: true
    name: postgres_net
