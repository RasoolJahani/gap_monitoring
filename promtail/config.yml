server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # All containers on the Docker host (app stack + monitoring stack).
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      # Align log label `service` with Prometheus blackbox `service` where names differ.
      - source_labels: [service]
        regex: frontend
        replacement: user-panel
        target_label: service
      - source_labels: [service]
        regex: admin-frontend
        replacement: admin-panel
        target_label: service
      - source_labels: [__meta_docker_container_log_path]
        target_label: __path__
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - replacement: docker
        target_label: job
